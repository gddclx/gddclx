<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDDCLX - 岗位管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        'primary-50': '#eff6ff',
                        'primary-100': '#dbeafe',
                        'primary-500': '#3b82f6',
                        'primary-600': '#2563eb',
                        'primary-900': '#1e3a8a',
                        'gddclx-dark': '#0a1128',
                        'gddclx-accent': '#059669',
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '2px',
                        DEFAULT: '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                        '2xl': '20px',
                        '3xl': '24px',
                        'full': '9999px',
                        'button': '4px'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', "Segoe UI", 'Roboto', "Helvetica Neue", 'Arial', 'sans-serif'],
                        pacifico: ['Pacifico', 'serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f6f9fc;
            background-image: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .glass-card:hover {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 1);
        }
        
        .interactive-element {
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .interactive-element:hover {
            transform: scale(1.05);
        }
        .interactive-element:active {
            transform: scale(0.95);
        }
        
        #logo-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 50;
        }
        #logo-menu.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body class="text-slate-800 font-sans p-4 md:p-8 flex flex-col gap-8">
    <header class="flex justify-between items-center w-full max-w-7xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="relative" id="logoWrapper">
                <button id="logoBtn" class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-md flex items-center justify-center interactive-element cursor-pointer">
                    <i class="fas fa-layer-group text-white text-lg flex justify-center items-center"></i>
                </button>
                <div id="logo-menu" class="glass-card w-48 p-2 bg-white/95 border-slate-200 m-0 shadow-xl z-50 rounded-xl">
                    <div class="py-2 flex flex-col gap-1">
                        <a href="javascript:history.back()" class="px-4 py-2 text-sm text-slate-700 hover:bg-primary-50 hover:text-primary-600 rounded-lg transition-colors flex items-center gap-2">
                            <i class="fas fa-arrow-left w-4"></i> 回到上一页
                        </a>
                        <a href="登录.html" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2">
                            <i class="fas fa-sign-out-alt w-4"></i> 退出登录
                        </a>
                    </div>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter text-gddclx-dark font-pacifico cursor-pointer" onclick="window.location.href='员工首页.html'">logo</h1>
        </div>

        <div class="flex items-center gap-6">
            <div class="hidden md:flex items-center gap-2 px-3 py-1.5 rounded-full bg-emerald-50 border border-emerald-100/50 text-emerald-600 text-sm font-medium">
                <span class="relative flex h-2 w-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                </span>
                系统运行正常
            </div>
    </header>

    <main class="w-full max-w-5xl mx-auto flex-1 flex flex-col gap-6">
        
        <!-- 页面标题 -->
        <div>
            <h2 class="text-3xl lg:text-4xl font-extrabold tracking-tighter text-gddclx-dark">全局概览</h2>
            <p class="text-base text-slate-500 mt-2">点击各业务模块卡片，直达对应管理系统。</p>
        </div>

        <!-- 模块卡片 -->
        <div class="grid grid-cols-1 gap-6">
            
            <!-- 考勤模块 -->
            <a href="考勤.html" class="glass-card p-8 flex flex-col relative overflow-hidden group cursor-pointer">
                <div class="flex justify-between items-start z-10">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-slate-800 flex items-center gap-2">
                            <i class="fas fa-clock text-primary-500 text-lg flex justify-center items-center w-5 h-5"></i>
                            今日考勤大盘
                        </h2>
                        <div class="flex items-baseline gap-3 mt-4">
                            <span class="text-5xl font-extrabold tracking-tighter text-primary-600"><span id="empAttendanceRate">--</span><span class="text-3xl">%</span></span>
                            <span id="empCheckedBadge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                实到 -- 人
                            </span>
                        </div>
                        <div id="empRateChangeContainer" class="mt-3 inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium" style="display: none;">
                            <i id="empRateChangeIcon" class="fas fa-arrow-up text-[10px] flex justify-center items-center"></i>
                            <span id="empRateChangeText"></span>
                        </div>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-primary-50 hover:text-primary-600 transition-colors cursor-pointer">
                        <i class="fas fa-arrow-right text-sm flex justify-center items-center w-5 h-5"></i>
                    </div>
                </div>


            </a>

            <!-- 绩效模块 -->
            <div class="glass-card p-8 bg-gradient-to-br from-gddclx-dark to-[#111f4d] border-none text-white relative overflow-hidden group">
                <div class="absolute top-0 right-0 w-48 h-48 bg-primary-500/30 rounded-full mix-blend-screen filter blur-3xl opacity-50 group-hover:scale-125 transition-transform duration-700"></div>

                <h2 class="text-lg font-medium text-blue-100/80 mb-6 relative z-10">本月预计绩效提成池</h2>

                <div class="relative z-10">
                    <div class="flex items-end gap-2">
                        <p class="text-5xl font-bold tracking-tighter"><span id="perfTotalAmount">--</span></p>
                        <span class="text-xl text-blue-200 font-medium mb-1 tracking-tight">万元</span>
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-white/10 relative z-10 flex items-center justify-between">
                    <div>
                        <p class="text-xs text-blue-200/60 mb-1">核算人数</p>
                        <p class="text-sm font-medium text-blue-100"><span id="perfStaffCount">--</span> 人</p>
                    </div>
                </div>

                <div class="mt-6 pt-5 border-t border-white/10 relative z-10">
                    <p class="text-xs text-blue-200/60 mb-3">我的绩效</p>
                    <div class="flex items-center gap-6">
                        <div>
                            <span id="myGradeBadge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-white/15 text-white/60">--</span>
                        </div>
                        <div>
                            <p class="text-xs text-blue-200/60">绩效得分</p>
                            <p class="text-lg font-bold text-white"><span id="myScore">--</span></p>
                        </div>
                        <div>
                            <p class="text-xs text-blue-200/60">提成金额</p>
                            <p class="text-lg font-bold text-white"><span id="myCommission">--</span></p>
                        </div>
                        <div>
                            <p class="text-xs text-blue-200/60">本月工资</p>
                            <p class="text-lg font-bold text-white"><span id="mySalary">--</span></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 任务模块 -->
            <a href="任务.html" class="glass-card p-8 flex flex-col relative overflow-hidden group cursor-pointer">
                <div class="flex justify-between items-start z-10">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-slate-800 flex items-center gap-2">
                            <i class="fas fa-tasks text-indigo-500 text-lg flex justify-center items-center w-5 h-5"></i>
                            任务中心
                        </h2>
                        <p class="text-sm text-slate-500 mt-2">查看任务 · 提交成果 · 查看反馈</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-indigo-50 hover:text-indigo-600 transition-colors cursor-pointer">
                        <i class="fas fa-arrow-right text-sm flex justify-center items-center w-5 h-5"></i>
                    </div>
                </div>
            </a>

            <!-- 消息模块 -->
            <a href="消息.html" class="glass-card p-8 flex flex-col relative overflow-hidden group cursor-pointer">
                <div class="flex justify-between items-start z-10">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-slate-800 flex items-center gap-2">
                            <i class="fas fa-envelope text-rose-500 text-lg flex justify-center items-center w-5 h-5"></i>
                            消息中心
                        </h2>
                        <p class="text-sm text-slate-500 mt-2">接收私信 · 查看通知 · 回复消息</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-rose-50 hover:text-rose-600 transition-colors cursor-pointer">
                        <i class="fas fa-arrow-right text-sm flex justify-center items-center w-5 h-5"></i>
                    </div>
                </div>
            </a>

            <!-- 摸个鱼模块 -->
            <a href="摸个鱼.html" class="glass-card p-8 flex flex-col relative overflow-hidden group cursor-pointer">
                <div class="flex justify-between items-start z-10">
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-slate-800 flex items-center gap-2">
                            <i class="fas fa-fish text-cyan-500 text-lg flex justify-center items-center w-5 h-5"></i>
                            摸个鱼
                        </h2>
                        <p class="text-sm text-slate-500 mt-2">轻松一下，享受片刻悠闲</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-cyan-50 hover:text-cyan-600 transition-colors cursor-pointer">
                        <i class="fas fa-arrow-right text-sm flex justify-center items-center w-5 h-5"></i>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <script>
        function getCurrentUserId() {
            var userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                try {
                    var parsed = JSON.parse(userInfo);
                    return parsed.userId || parsed.employeeId || parsed.employee_id || parsed.id;
                } catch (e) {
                    console.error('解析用户信息失败', e);
                }
            }
            var userId = localStorage.getItem('userId');
            if (userId) return userId;
            return null;
        }

        function getMyGradeInfo(score) {
            var s = parseFloat(score) || 0;
            if (s >= 100) return { label: 'S', className: 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-amber-400/30 text-amber-200 border border-amber-400/40' };
            if (s >= 98) return { label: 'A', className: 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-red-400/30 text-red-200 border border-red-400/40' };
            if (s >= 95) return { label: 'B', className: 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-blue-400/30 text-blue-200 border border-blue-400/40' };
            return { label: 'C', className: 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold bg-green-400/30 text-green-200 border border-green-400/40' };
        }

        function formatMyMoney(amount) {
            var num = parseFloat(amount) || 0;
            return '¥ ' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getBaseSalary(employeeId) {
            if (!employeeId) return 0;
            var numStr = employeeId.replace(/\D/g, '');
            if (!numStr || numStr.length === 0) return 0;
            var lastThree = parseInt(numStr.slice(-3), 10) || 0;
            if (lastThree < 200) return 8000;
            if (lastThree <= 300) return 6000;
            return 5000;
        }

        async function loadEmployeeAttendanceData() {
            try {
                var response = await fetch('/api/attendance/today/company');
                var result = await response.json();
                var data = result.data || result;

                var todayRate = data.attendanceRate || data.attendance_rate;
                var yesterdayRate = data.yesterdayRate || data.yesterday_rate;
                var checkedCount = data.checkedCount || data.checked_count;
                var totalCount = data.totalCount || data.total_count;

                if (todayRate !== undefined && todayRate !== null) {
                    todayRate = parseFloat(Number(todayRate).toFixed(1));
                    document.getElementById('empAttendanceRate').textContent = todayRate;
                }

                if (checkedCount !== undefined && checkedCount !== null) {
                    document.getElementById('empCheckedBadge').textContent = '实到 ' + Number(checkedCount).toLocaleString() + ' 人';
                }

                var container = document.getElementById('empRateChangeContainer');
                var icon = document.getElementById('empRateChangeIcon');
                var text = document.getElementById('empRateChangeText');

                if (yesterdayRate !== undefined && yesterdayRate !== null) {
                    yesterdayRate = parseFloat(yesterdayRate);
                    var change = todayRate - yesterdayRate;
                    var absChange = Math.abs(change);
                    absChange = parseFloat(absChange.toFixed(1));

                    container.style.display = 'inline-flex';

                    if (change > 0) {
                        container.className = 'mt-3 inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700';
                        icon.className = 'fas fa-arrow-up text-green-500 text-[10px] flex justify-center items-center';
                        text.textContent = '较昨日提升 ' + absChange + '%';
                    } else if (change < 0) {
                        container.className = 'mt-3 inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-700';
                        icon.className = 'fas fa-arrow-down text-red-500 text-[10px] flex justify-center items-center';
                        text.textContent = '较昨日下降 ' + absChange + '%';
                    } else {
                        container.className = 'mt-3 inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded-full text-xs font-medium bg-slate-100 text-slate-600';
                        icon.className = 'fas fa-minus text-slate-400 text-[10px] flex justify-center items-center';
                        text.textContent = '与昨日持平';
                    }
                }
            } catch (error) {
                console.error('加载考勤数据失败:', error);
            }
        }

        async function loadPerformanceSummary() {
            try {
                var response = await fetch('/api/performance/list');
                var result = await response.json();
                var data = result.data || result;
                var list = Array.isArray(data) ? data : (data && data.list ? data.list : []);

                var totalAmount = 0;
                var staffCount = 0;
                list.forEach(function(item) {
                    totalAmount += parseFloat(item.commissionAmount) || 0;
                    if (item.position && item.position.trim() && item.position.trim() !== '无') {
                        staffCount++;
                    }
                });

                var totalWan = (totalAmount / 10000).toFixed(2);
                document.getElementById('perfTotalAmount').textContent = totalWan;
                document.getElementById('perfStaffCount').textContent = staffCount;

                var currentUserId = getCurrentUserId();
                var myData = null;
                if (currentUserId) {
                    for (var i = 0; i < list.length; i++) {
                        if (list[i].employeeId === currentUserId || list[i].employee_id === currentUserId || list[i].userId === currentUserId || list[i].user_id === currentUserId || list[i].id === currentUserId) {
                            myData = list[i];
                            break;
                        }
                    }
                }

                if (myData) {
                    var grade = getMyGradeInfo(myData.performanceScore);
                    var badge = document.getElementById('myGradeBadge');
                    badge.className = grade.className;
                    badge.textContent = grade.label + ' 级';
                    document.getElementById('myScore').textContent = myData.performanceScore != null ? myData.performanceScore : '--';
                    document.getElementById('myCommission').textContent = formatMyMoney(myData.commissionAmount);

                    var baseSalary = getBaseSalary(myData.employeeId);
                    var totalSalary = (parseFloat(myData.commissionAmount) || 0) + baseSalary;
                    document.getElementById('mySalary').textContent = formatMyMoney(totalSalary);
                }
            } catch (error) {
                console.error('加载绩效汇总失败:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadEmployeeAttendanceData();
            loadPerformanceSummary();
        });

        document.getElementById('logoBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('logo-menu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('logo-menu');
            if (menu.classList.contains('active') && !document.getElementById('logoWrapper').contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
