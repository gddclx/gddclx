<script>
var API_BASE = getApiBase() + '/api';
function goHome(){try{var u=JSON.parse(localStorage.getItem('userInfo'));window.location.href=u&&u.role==='admin'?'首页.html':'员工首页.html';}catch(e){window.location.href='员工首页.html';}}
var PAGE_SIZE = 10;
var currentPage = 1;
var searchQuery = '';
var allEmployees = [];
var currentEditEmployee = null;

// ==================== Logo Dropdown ====================
document.getElementById('logoBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('logo-menu').classList.toggle('active');
});
document.addEventListener('click', function(e) {
    var menu = document.getElementById('logo-menu');
    if (menu.classList.contains('active') && !document.getElementById('logoWrapper').contains(e.target)) {
        menu.classList.remove('active');
    }
});

// ==================== API Helpers ====================
function getHeaders() {
    var headers = { 'Content-Type': 'application/json' };
    var token = localStorage.getItem('token');
    if (token) headers['Authorization'] = 'Bearer ' + token;
    return headers;
}

async function fetchAPI(url, options) {
    options = options || {};
    options.headers = Object.assign(getHeaders(), options.headers || {});
    var res = await fetch(url, options);
    if (!res.ok) throw new Error('API error: ' + res.status);
    var result = await res.json();
    return result.data || result;
}

// ==================== Load Position Stats ====================
async function loadPositionStats() {
    var container = document.getElementById('positionStats');
    try {
        var data = await fetchAPI(API_BASE + '/position/stats');
        var stats = data.stats || data;

        if (typeof stats === 'object' && !Array.isArray(stats)) {
            var arr = [];
            Object.keys(stats).forEach(function(k) {
                arr.push({ name: k, count: stats[k] });
            });
            stats = arr;
        }

        if (!Array.isArray(stats) || stats.length === 0) {
            container.innerHTML = '<div class="text-center text-slate-400 text-xs py-4">暂无数据</div>';
            return;
        }
        container.innerHTML = stats.map(function(s) {
            var name = s.name || s.position || s.position_name || s.positionName || s.title || s.label || '未知';
            var count = s.count || s.employee_count || s.employeeCount || s.value || s.number || 0;
            return '<div class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-blue-50 cursor-pointer transition-colors stat-item" data-position="' + name.replace(/"/g, '&quot;') + '">' +
                '<span class="text-sm text-gray-700">' + name + '</span>' +
                '<span class="text-sm font-semibold text-primary">' + count + '人</span>' +
            '</div>';
        }).join('');

        container.querySelectorAll('.stat-item').forEach(function(item) {
            item.addEventListener('click', function() {
                searchQuery = this.dataset.position;
                var input = document.querySelector('input[type="text"]');
                if (input) input.value = searchQuery;
                currentPage = 1;
                loadPositionList();
            });
        });
    } catch (err) {
        container.innerHTML = '<div class="text-center text-red-400 text-xs py-4">加载失败</div>';
    }
}

// ==================== Load Position List ====================
async function loadPositionList() {
    var tbody = document.getElementById('tableBody');
    try {
        var params = new URLSearchParams();
        if (searchQuery) params.set('search', searchQuery);
        params.set('page', currentPage);
        params.set('page_size', PAGE_SIZE);

        var data = await fetchAPI(API_BASE + '/position/list?' + params.toString());
        allEmployees = data.list || data.items || data.records || data;
        if (!Array.isArray(allEmployees)) allEmployees = [];
        var total = data.total || allEmployees.length;
        renderTable(allEmployees);
        renderPagination(total);
    } catch (err) {
        tbody.innerHTML = '<div class="text-center text-red-400 text-sm py-10">加载失败，请稍后重试</div>';
    }
}

// ==================== Render Table ====================
function renderTable(employees) {
    var tbody = document.getElementById('tableBody');
    if (!employees || employees.length === 0) {
        tbody.innerHTML = '<div class="text-center text-slate-400 text-sm py-10">暂无数据</div>';
        return;
    }

    tbody.innerHTML = employees.map(function(emp) {
        var positions = emp.positions || emp.position || [];
        var positionNames = Array.isArray(positions) ? positions.join('、') : positions;
        var department = emp.department || '无';
        var empId = emp.employeeId || emp.id || '';

        return '<div class="px-6 py-4 hover:bg-gray-50 transition-colors employee-row">' +
            '<div class="grid grid-cols-12 gap-4 items-center">' +
                '<div class="col-span-3">' +
                    '<div class="text-sm font-medium text-gray-900">' + (emp.name || '') + '</div>' +
                    '<div class="text-xs text-gray-500">' + empId + '</div>' +
                '</div>' +
                '<div class="col-span-4">' +
                    '<span class="text-sm text-gray-700">' + (positionNames || '未分配') + '</span>' +
                '</div>' +
                '<div class="col-span-3">' +
                    '<span class="text-sm text-gray-600">' + department + '</span>' +
                '</div>' +
                '<div class="col-span-2 text-right">' +
                    '<button class="w-8 h-8 flex items-center justify-center rounded-lg text-slate-400 hover:text-primary hover:bg-primary-50 transition-all edit-row-btn" data-employee-id="' + empId + '" title="编辑">' +
                        '<svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>' +
                    '</button>' +
                '</div>' +
            '</div>' +
        '</div>';
    }).join('');

    tbody.querySelectorAll('.edit-row-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var empId = this.dataset.employeeId;
            var emp = allEmployees.find(function(e) { return (e.employeeId || e.id) === empId; });
            if (emp) openEditModal(emp);
        });
    });
}

// ==================== Pagination ====================
function renderPagination(total) {
    var totalPages = Math.ceil(total / PAGE_SIZE) || 1;
    var container = document.querySelector('.mt-6.flex.items-center.justify-between');
    if (!container) return;

    var totalSpan = container.querySelector('.font-medium');
    if (totalSpan) totalSpan.textContent = total;

    var pageContainer = container.querySelector('.flex.space-x-1');
    if (!pageContainer) return;

    var html = '';
    var maxShow = 5;
    var start = Math.max(1, currentPage - Math.floor(maxShow / 2));
    var end = Math.min(totalPages, start + maxShow - 1);
    if (end - start < maxShow - 1) start = Math.max(1, end - maxShow + 1);

    for (var i = start; i <= end; i++) {
        html += '<button class="px-3 py-1 border border-gray-300 ' + (i === currentPage ? 'bg-white text-blue-600 font-medium' : 'hover:bg-gray-50') + ' whitespace-nowrap page-btn" data-page="' + i + '">' + i + '</button>';
    }
    if (end < totalPages) {
        html += '<span class="px-3 py-1 text-gray-500">...</span>';
        html += '<button class="px-3 py-1 border border-gray-300 hover:bg-gray-50 whitespace-nowrap page-btn" data-page="' + totalPages + '">' + totalPages + '</button>';
    }
    pageContainer.innerHTML = html;

    pageContainer.querySelectorAll('.page-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            currentPage = parseInt(this.dataset.page);
            loadPositionList();
        });
    });

    var buttons = container.querySelectorAll('button');
    var prevBtn = buttons[0];
    var nextBtn = buttons[buttons.length - 1];

    if (prevBtn && prevBtn.textContent.indexOf('上一页') !== -1) {
        prevBtn.disabled = currentPage <= 1;
        if (currentPage <= 1) {
            prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
        prevBtn.onclick = function() {
            if (currentPage > 1) { currentPage--; loadPositionList(); }
        };
    }
    if (nextBtn && nextBtn.textContent.indexOf('下一页') !== -1) {
        nextBtn.disabled = currentPage >= totalPages;
        if (currentPage >= totalPages) {
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
        } else {
            nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
        }
        nextBtn.onclick = function() {
            if (currentPage < totalPages) { currentPage++; loadPositionList(); }
        };
    }
}

// ==================== Edit Modal ====================
function openEditModal(employee) {
    currentEditEmployee = employee;
    var empId = employee.employeeId || employee.id || '';
    var positions = employee.positions || employee.position || [];
    var posArr = Array.isArray(positions) ? positions : (positions ? [positions] : []);

    document.getElementById('modalEmployeeInfo').innerHTML = '<div class="text-sm">' +
        '<div class="font-medium text-gray-900">' + (employee.name || '') + ' (ID: ' + empId + ')</div>' +
        '<div class="text-gray-600 mt-1">当前岗位数量: ' + posArr.length + '</div>' +
    '</div>';

    var deptSelect = document.getElementById('modalDepartment');
    deptSelect.value = employee.department || '';

    var posList = document.getElementById('positionList');
    if (posArr.length > 0) {
        posList.innerHTML = posArr.map(function(pos, i) {
            return '<div class="flex gap-3 items-end">' +
                '<div class="flex-1">' +
                    '<label class="block text-xs text-gray-500 mb-1">岗位 ' + (i + 1) + '</label>' +
                    '<input type="text" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入岗位名称" value="' + pos.replace(/"/g, '&quot;') + '">' +
                '</div>' +
                '<button class="text-red-500 hover:text-red-700 p-2" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>' +
            '</div>';
        }).join('');
    } else {
        posList.innerHTML = '<div class="flex gap-3 items-end">' +
            '<div class="flex-1">' +
                '<label class="block text-xs text-gray-500 mb-1">岗位 1</label>' +
                '<input type="text" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入岗位名称">' +
            '</div>' +
            '<button class="text-red-500 hover:text-red-700 p-2" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>' +
        '</div>';
    }

    document.getElementById('editModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('editModal').classList.add('hidden');
    currentEditEmployee = null;
}

async function savePositionUpdate() {
    if (!currentEditEmployee) return;

    var department = document.getElementById('modalDepartment').value;
    var positionInputs = document.querySelectorAll('#positionList input[type="text"]');
    var positions = [];
    positionInputs.forEach(function(input) {
        var val = input.value.trim();
        if (val) positions.push(val);
    });

    var empId = currentEditEmployee.employeeId || currentEditEmployee.id;
    var payload = {
        employeeId: empId,
        department: department,
        positions: positions
    };
    try {
        var resp = await fetch(API_BASE + '/position/update', {
            method: 'POST',
            headers: getHeaders(),
            body: JSON.stringify(payload)
        });
        var result = await resp.json();
        if (result.code === 200 || result.code === 0 || result.success) {
            closeModal();
            loadPositionList();
            loadPositionStats();
        } else {
            alert('保存失败: ' + (result.message || '未知错误'));
        }
    } catch (err) {
        console.error('保存异常:', err);
        alert('保存失败，请稍后重试: ' + err.message);
    }
}

function addPosition() {
    var list = document.getElementById('positionList');
    var count = list.children.length + 1;
    var div = document.createElement('div');
    div.className = 'flex gap-3 items-end';
    div.innerHTML = '<div class="flex-1"><label class="block text-xs text-gray-500 mb-1">岗位 ' + count + '</label><input type="text" class="w-full p-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="请输入岗位名称"></div><button class="text-red-500 hover:text-red-700 p-2" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>';
    list.appendChild(div);
}

// ==================== Search ====================
var searchInput = document.querySelector('input[type="text"]');
var searchTimeout;
if (searchInput) {
