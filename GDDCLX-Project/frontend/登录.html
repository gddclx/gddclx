<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星跃电商 | 员工管理系统登录</title>
    
    <!-- 引入 Tailwind CSS v3 (稳定CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5', // Indigo-600
                        secondary: '#6366f1', // Indigo-500
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '2px',
                        DEFAULT: '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                        '2xl': '20px',
                        '3xl': '24px',
                        'full': '9999px',
                        'button': '4px'
                    }
                }
            }
        }
    </script>
    
    <!-- 引入现代无衬线字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css">

    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 10% 10%, rgba(99, 102, 241, 0.1) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(168, 85, 247, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 隐藏原生输入框自动填充的背景色 */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px white inset !important;
            -webkit-text-fill-color: #1e293b !important;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body class="min-h-[1024px] flex items-center justify-center p-4 sm:p-8 relative overflow-hidden">

    <!-- 装饰性背景模糊球 -->
    <div class="fixed top-[-15%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/10 blur-[120px] pointer-events-none"></div>
    <div class="fixed bottom-[-15%] right-[-10%] w-[40vw] h-[40vw] rounded-full bg-purple-400/10 blur-[120px] pointer-events-none"></div>

    <!-- 主容器：Bento 风格的非对称分割卡片 -->
    <main class="w-full max-w-[1440px] h-[800px] max-h-[90vh] bg-white/70 backdrop-blur-2xl rounded-3xl shadow-2xl ring-1 ring-black/5 overflow-hidden flex flex-col lg:flex-row relative z-10 mx-auto">
        
        <!-- 左侧：视觉展示区 (仅大屏显示) -->
        <section class="hidden lg:flex lg:w-[55%] relative bg-slate-900 overflow-hidden group">
            <img class="absolute inset-0 w-full h-full object-cover object-top opacity-85 mix-blend-overlay transition-transform duration-[10s] ease-out group-hover:scale-105" 
                 src="https://static.mastergo.com/ai/img_res/1778205525505a1b2c3d4e5f6g7h8i9j.jpg" 
                 alt="现代电商物流中心">
            
            <!-- 材质叠加层 -->
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/95 via-slate-900/40 to-transparent"></div>
            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9IiNmZmYiIGZpbGwtb3BhY2l0eT0iMC4wNSIvPjwvc3ZnPg==')] opacity-30"></div>
            
            <!-- 内容信息 -->
            <div class="absolute bottom-0 left-0 w-full p-16 text-white flex flex-col justify-end">
                <div class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-white/10 backdrop-blur-md ring-1 ring-white/20 mb-8 w-max">
                    <span class="relative flex h-2.5 w-2.5">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                    </span>
                    <span class="text-xs font-semibold tracking-wider uppercase text-white/90">System Vision 1.0</span>
                </div>
                
                <h2 class="text-4xl xl:text-5xl font-bold tracking-tighter mb-6 leading-[1.15]">
                    驱动微小电商<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-200 to-white">实现指数级增长</span>
                </h2>
                
                <p class="text-blue-100/80 text-lg max-w-md font-normal leading-relaxed">
                    全新一代员工管理工作台。无缝整合订单流转、仓储协同与绩效追踪，为您的企业提供次世代的数字化生产力。
                </p>
            </div>
        </section>
        
        <!-- 右侧：登录表单交互区 -->
        <section class="w-full lg:w-[45%] p-8 sm:p-12 lg:p-16 xl:p-20 flex flex-col justify-center relative bg-white/40">
            <div class="w-full max-w-sm mx-auto">
                
                <!-- 品牌 Logo -->
                <header class="flex items-center gap-3 mb-14">
                    <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center shadow-lg shadow-primary/25 ring-1 ring-white/50">
                        <i class="fas fa-cube text-white text-xl flex justify-center items-center"></i>
                    </div>
                    <span class="text-2xl font-bold text-slate-900 tracking-tight font-['Pacifico']">logo</span>
                </header>

                <!-- 欢迎语 -->
                <div class="mb-10">
                    <h1 class="text-3xl font-bold text-slate-900 tracking-tighter mb-3">欢迎回来</h1>
                    <p class="text-slate-500 text-sm font-medium">请输入您的员工工号和密码以访问后台。</p>
                </div>

                <!-- 登录/注册表单 -->
                <form class="space-y-6" id="loginForm" action="#" method="POST">
                    
                    <!-- 工号输入 -->
                    <div class="space-y-2">
                        <label for="employee_id" class="block text-sm font-semibold text-slate-700">员工工号</label>
                        <div class="relative group">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-user text-slate-400 text-sm flex justify-center items-center w-4 h-4"></i>
                            </div>
                            <input type="text" id="employee_id" name="employee_id" required 
                                   class="block w-full pl-11 pr-4 py-3.5 bg-slate-50/80 border border-slate-200/80 rounded-xl text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-[3px] focus:ring-primary/20 focus:border-primary transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] outline-none text-sm"
                                   placeholder="例如: EMP-2026">
                        </div>
                    </div>

                    <!-- 密码输入 -->
                    <div class="space-y-2">
                        <label for="password" class="block text-sm font-semibold text-slate-700">登录密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400 text-sm flex justify-center items-center w-4 h-4"></i>
                            </div>
                            <input type="password" id="password" name="password" required 
                                   class="block w-full pl-11 pr-4 py-3.5 bg-slate-50/80 border border-slate-200/80 rounded-xl text-slate-900 placeholder-slate-400 focus:bg-white focus:ring-[3px] focus:ring-primary/20 focus:border-primary transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] outline-none text-sm"
                                   placeholder="••••••••">
                        </div>
                    </div>

                    <!-- 记住我 -->
                    <div class="flex items-center pt-2">
                        <input id="remember-me" name="remember-me" type="checkbox" 
                               class="h-4 w-4 text-primary focus:ring-primary border-slate-300 rounded cursor-pointer transition-all duration-300">
                        <label for="remember-me" class="ml-2.5 block text-sm font-medium text-slate-600 cursor-pointer select-none">
                            保持登录状态长达 7 天
                        </label>
                    </div>

                    <!-- 提交按钮 -->
                    <div class="pt-4 space-y-3">
                        <button type="submit" id="submitBtn" class="!rounded-button whitespace-nowrap w-full flex justify-center items-center py-3.5 px-4 border border-transparent shadow-sm text-sm font-bold text-white bg-primary hover:bg-secondary focus:outline-none focus:ring-[3px] focus:ring-primary/30 transition-all duration-300 ease-[cubic-bezier(0.22,1,0.36,1)] active:scale-[0.98] group rounded-xl">
                            <span id="btnText">安全登录</span>
                            <span id="btnLoading" class="hidden">
                                <i class="fas fa-spinner fa-spin mr-2"></i>
                                登录中...
                            </span>
                        </button>
                        
                        <!-- 错误提示 -->
                        <div id="errorMsg" class="hidden text-center text-red-600 text-sm font-medium bg-red-50 px-4 py-2 rounded-lg"></div>
                        
                        <!-- 注册按钮 -->
                        <div class="text-center mt-4">
                            <span class="text-sm text-slate-500">还没有账号？</span>
                            <a href="注册.html" class="text-sm font-semibold text-primary hover:text-secondary transition-colors duration-300 ml-1">立即注册</a>
                        </div>
                    </div>
                </form>

                <script>
                    document.getElementById('loginForm').addEventListener('submit', async function(e) {
                        e.preventDefault();
                        
                        const employeeId = document.getElementById('employee_id').value;
                        const password = document.getElementById('password').value;
                        const submitBtn = document.getElementById('submitBtn');
                        const btnText = document.getElementById('btnText');
                        const btnLoading = document.getElementById('btnLoading');
                        const errorMsg = document.getElementById('errorMsg');
                        
                        btnText.classList.add('hidden');
                        btnLoading.classList.remove('hidden');
                        submitBtn.disabled = true;
                        errorMsg.classList.add('hidden');
                        
                        try {
                            const response = await fetch('/api/login', {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json',
                                },
                                body: JSON.stringify({
                                    employee_id: employeeId,
                                    password: password
                                })
                            });
                            
                            const result = await response.json();
                            
                            if (result.code === 200) {
                                localStorage.setItem('token', result.data.token);
                                localStorage.setItem('userInfo', JSON.stringify(result.data.user));
                                
                                if (result.data.user.role === 'admin') {
                                    window.location.href = '首页.html';
                                } else {
                                    window.location.href = '员工首页.html';
                                }
                            } else {
                                errorMsg.textContent = result.message || '登录失败，请重试';
                                errorMsg.classList.remove('hidden');
                            }
                        } catch (error) {
                            errorMsg.textContent = '网络错误，请检查后端服务是否启动';
                            errorMsg.classList.remove('hidden');
                        } finally {
                            btnText.classList.remove('hidden');
                            btnLoading.classList.add('hidden');
                            submitBtn.disabled = false;
                        }
                    });
                </script>

                <!-- 页脚信息 -->
                <footer class="mt-14 text-center">
                    <p class="text-xs text-slate-400 font-medium leading-relaxed">
                        &copy; 2026 星跃电商科技. 仅限内部员工使用.<br>
                        Powered by SpringBoot & MyBatis Architecture
                    </p>
                </footer>
            </div>
        </section>
    </main>

</body>
</html>
