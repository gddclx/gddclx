<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全员绩效与提成花名册</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        accent: '#F59E0B',
                        danger: '#EF4444',
                        'primary-50': '#eff6ff',
                        'primary-100': '#dbeafe',
                        'primary-500': '#4F46E5',
                        'primary-600': '#3730a3',
                        'primary-900': '#1e3a8a',
                        'gddclx-dark': '#0a1128',
                    },
                    borderRadius: {
                        'none': '0px',
                        'sm': '2px',
                        DEFAULT: '4px',
                        'md': '8px',
                        'lg': '12px',
                        'xl': '16px',
                        '2xl': '20px',
                        '3xl': '24px',
                        'full': '9999px',
                        'button': '8px'
                    },
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', "Segoe UI", 'Roboto', "Helvetica Neue", 'Arial', 'sans-serif'],
                        pacifico: ['Pacifico', 'serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link href="https://static.mastergo.com/static/ai/resource/html/font-awesome/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f6f9fc;
            background-image: radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.1) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
        }
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .interactive-element {
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .interactive-element:hover {
            transform: scale(1.05);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        #logo-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 50;
        }
        #logo-menu.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }
        #searchInput:focus {
            outline: none;
        }
    </style>
</head>
<body class="flex flex-col p-4 md:p-8">
    <header class="flex justify-between items-center w-full max-w-7xl mx-auto mb-6">
        <div class="flex items-center gap-3">
                <div class="relative" id="logoWrapper">
                    <button id="logoBtn" class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-md flex items-center justify-center interactive-element cursor-pointer">
                        <i class="fas fa-layer-group text-white text-lg flex justify-center items-center"></i>
                    </button>
                    <div id="logo-menu" class="glass-card w-48 p-2 bg-white/95 border-slate-200 m-0 shadow-xl z-50 rounded-xl">
                        <div class="py-2 flex flex-col gap-1">
                            <a href="javascript:history.back()" class="px-4 py-2 text-sm text-slate-700 hover:bg-primary-50 hover:text-primary-600 rounded-lg transition-colors flex items-center gap-2">
                                <i class="fas fa-arrow-left w-4"></i> 回到上一页
                            </a>
                            <a href="登录.html" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2">
                                <i class="fas fa-sign-out-alt w-4"></i> 退出登录
                            </a>
                        </div>
                    </div>
                </div>
                <h1 class="text-2xl font-bold tracking-tighter text-gddclx-dark font-pacifico cursor-pointer" onclick="goHome()">logo</h1>
            </div>

            
            <div class="glass-card px-6 py-4 flex items-center gap-8">
                <div>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">本月应发金额</p>
                    <p class="text-2xl font-bold text-primary" id="headerTotalAmount">¥ --</p>
                </div>
                <div class="w-px h-10 bg-slate-200"></div>
                <div>
                    <p class="text-xs text-slate-400 font-medium uppercase tracking-wider mb-1">核算人数</p>
                    <p class="text-xl font-bold text-slate-700"><span id="headerStaffCount">--</span> <span class="text-xs font-normal text-slate-400">人</span></p>
                </div>
            </div>
        </header>

        <main class="flex-1 max-w-7xl mx-auto w-full flex flex-col gap-6">
        <div class="glass-card flex flex-col overflow-hidden w-full">
            <div class="p-6 border-b border-slate-200 flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-800">全员绩效与提成明细</h2>
                    <p class="text-sm text-slate-500 mt-1">实时展示本月所有员工的绩效得分及对应的提成金额</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input id="searchInput" type="text" placeholder="按姓氏筛选..." class="pl-9 pr-4 py-2 border border-slate-200 rounded-lg text-sm text-slate-700 bg-white w-48 transition-all focus:border-primary focus:ring-1 focus:ring-primary/20">
                    </div>
                </div>
            </div>
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-slate-50/50">
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">员工信息</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider">岗位/部门</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">绩效等级</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">绩效得分</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">提成金额</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-right">应发金额</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">迟到</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">早退</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">扣款</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">状态</th>
                            <th class="px-6 py-4 text-xs font-bold text-slate-500 uppercase tracking-wider text-center">操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="11" class="px-6 py-20 text-center text-slate-400">
                                <i class="fas fa-spinner fa-spin text-2xl mb-3 block"></i>
                                <p class="text-sm">正在加载数据...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="p-4 bg-slate-50/50 border-t border-slate-200 flex items-center justify-between">
                <p class="text-xs text-slate-500" id="paginationInfo">正在加载...</p>
                <div class="flex items-center gap-2" id="paginationBtns"></div>
            </div>
        </div>
    </main>

    <script>
        var API_BASE_URL = getApiBase();
        function goHome(){try{var u=JSON.parse(localStorage.getItem('userInfo'));window.location.href=u&&u.role==='admin'?'首页.html':'员工首页.html';}catch(e){window.location.href='员工首页.html';}}
        var allData = [];
        var filteredData = [];
        var currentPage = 1;
        var pageSize = 10;

        function getSurname(name) {
            if (!name) return '?';
            return name.charAt(0);
        }

        function getGradeInfo(score) {
            var s = parseFloat(score) || 0;
            if (s >= 100) return { label: 'S', color: 'bg-amber-100 text-amber-700', dot: 'bg-amber-500' };
            if (s >= 98) return { label: 'A', color: 'bg-red-100 text-red-700', dot: 'bg-red-500' };
            if (s >= 95) return { label: 'B', color: 'bg-blue-100 text-blue-700', dot: 'bg-blue-500' };
            return { label: 'C', color: 'bg-green-100 text-green-700', dot: 'bg-green-500' };
        }

        function getStatusInfo(position) {
            if (position && position.trim() && position.trim() !== '无') {
                return { label: '正常', dot: 'bg-secondary', textColor: 'text-secondary' };
            }
            return { label: '空闲', dot: 'bg-slate-300', textColor: 'text-slate-400' };
        }

        function formatMoney(amount) {
            var num = parseFloat(amount) || 0;
            return '¥ ' + num.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderTable() {
            var start = (currentPage - 1) * pageSize;
            var pageData = filteredData.slice(start, start + pageSize);
            var tbody = document.getElementById('tableBody');

            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" class="px-6 py-20 text-center text-slate-400"><p class="text-sm">暂无数据</p></td></tr>';
                return;
            }

            tbody.innerHTML = pageData.map(function(item) {
                var surname = getSurname(item.name);
                var grade = getGradeInfo(item.performanceScore);
                var status = getStatusInfo(item.position);
                var positionText = (item.position && item.position.trim() && item.position.trim() !== '无') ? item.position : '无';
                var deptText = (item.department && item.department.trim() && item.department.trim() !== '无') ? item.department : '无';

                return '<tr class="hover:bg-slate-50/50 transition-colors group">' +
                    '<td class="px-6 py-5">' +
                        '<div class="flex items-center gap-3">' +
                            '<div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white text-sm font-bold shrink-0">' + surname + '</div>' +
                            '<div>' +
                                '<p class="text-sm font-bold text-slate-800">' + (item.name || '--') + '</p>' +
                                '<p class="text-xs text-slate-500">ID: ' + (item.employeeId || '--') + '</p>' +
                            '</div>' +
                        '</div>' +
                    '</td>' +
                    '<td class="px-6 py-5">' +
                        '<p class="text-sm text-slate-600">' + positionText + '</p>' +
                        '<p class="text-xs text-slate-500">' + deptText + '</p>' +
                    '</td>' +
                    '<td class="px-6 py-5 text-center">' +
                        '<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-bold ' + grade.color + '">' + grade.label + ' 级</span>' +
                    '</td>' +
                    '<td class="px-6 py-5 text-center font-semibold text-slate-700">' + (item.performanceScore != null ? item.performanceScore : '--') + '</td>' +
                    '<td class="px-6 py-5 text-right">' +
                        '<p class="text-sm font-bold text-primary">' + formatMoney(item.commissionAmount) + '</p>' +
                    '</td>' +
                    '<td class="px-6 py-5 text-right">' +
                        '<p class="text-sm font-bold text-emerald-600">' + formatMoney((parseFloat(item.commissionAmount) || 0) - (parseInt(item.salaryDeduct) || 0)) + '</p>' +
                    '</td>' +
                    '<td class="px-6 py-5 text-center text-sm">' + (item.lateCount || 0) + '</td>' +
                    '<td class="px-6 py-5 text-center text-sm">' + (item.earlyCount || 0) + '</td>' +
                    '<td class="px-6 py-5 text-center text-sm font-bold text-red-500">¥' + (item.salaryDeduct || 0) + '</td>' +
                    '<td class="px-6 py-5 text-center">' +
                        '<span class="inline-flex items-center gap-1.5 text-xs ' + status.textColor + ' font-medium">' +
                            '<span class="w-2 h-2 rounded-full ' + status.dot + '"></span>' + status.label +
                        '</span>' +
                    '</td>' +
                    '<td class="px-6 py-5 text-center">' +
                        '<button onclick="confirmLate(\'' + item.employeeId + '\')" class="text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200 mr-1">确认迟到</button>' +
                        '<button onclick="confirmEarly(\'' + item.employeeId + '\')" class="text-xs px-2 py-1 bg-orange-100 text-orange-700 rounded hover:bg-orange-200 mr-1">确认早退</button>' +
                        '<button onclick="forgiveLate(\'' + item.employeeId + '\')" class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200 mr-1">赦免迟到</button>' +
                        '<button onclick="forgiveEarly(\'' + item.employeeId + '\')" class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded hover:bg-green-200">赦免早退</button>' +
                    '</td>' +
                '</tr>';
            }).join('');

            updatePagination();
        }

        function updatePagination() {
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (totalPages < 1) totalPages = 1;
            var start = filteredData.length > 0 ? (currentPage - 1) * pageSize + 1 : 0;
            var end = Math.min(currentPage * pageSize, filteredData.length);

            document.getElementById('paginationInfo').textContent = '显示第 ' + start + ' 至 ' + end + ' 条，共 ' + filteredData.length + ' 条数据';

            var btnsHtml = '';
            btnsHtml += '<button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-400 hover:bg-white transition-all" onclick="goPage(' + (currentPage - 1) + ')" ' + (currentPage === 1 ? 'disabled style="opacity:0.4;cursor:not-allowed"' : '') + '><i class="fas fa-chevron-left text-[10px]"></i></button>';

            var maxVisible = 5;
            var startPage = Math.max(1, currentPage - 2);
            var endPage = Math.min(totalPages, startPage + maxVisible - 1);
            if (endPage - startPage < maxVisible - 1) {
                startPage = Math.max(1, endPage - maxVisible + 1);
            }

            for (var i = startPage; i <= endPage; i++) {
                if (i === currentPage) {
                    btnsHtml += '<button class="w-8 h-8 flex items-center justify-center rounded bg-primary text-white text-xs font-bold">' + i + '</button>';
                } else {
                    btnsHtml += '<button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-600 text-xs hover:bg-white transition-all" onclick="goPage(' + i + ')">' + i + '</button>';
                }
            }

            if (endPage < totalPages) {
                btnsHtml += '<span class="text-slate-400 text-xs px-1">...</span>';
                btnsHtml += '<button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-600 text-xs hover:bg-white transition-all" onclick="goPage(' + totalPages + ')">' + totalPages + '</button>';
            }

            btnsHtml += '<button class="w-8 h-8 flex items-center justify-center rounded border border-slate-200 text-slate-400 hover:bg-white transition-all" onclick="goPage(' + (currentPage + 1) + ')" ' + (currentPage === totalPages ? 'disabled style="opacity:0.4;cursor:not-allowed"' : '') + '><i class="fas fa-chevron-right text-[10px]"></i></button>';

            document.getElementById('paginationBtns').innerHTML = btnsHtml;
        }

        function goPage(page) {
            var totalPages = Math.ceil(filteredData.length / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            renderTable();
        }

        function applyFilter() {
            var keyword = document.getElementById('searchInput').value.trim();
            if (!keyword) {
                filteredData = allData.slice();
            } else {
                filteredData = allData.filter(function(item) {
                    var surname = getSurname(item.name);
                    return surname.indexOf(keyword) !== -1;
                });
            }
            currentPage = 1;
            renderTable();
        }

        function updateHeaderStats() {
            var totalAmount = 0;
            var staffCount = 0;
            allData.forEach(function(item) {
                // 提成金额 - 扣款 = 实发金额
                var net = (parseFloat(item.commissionAmount) || 0) - (parseInt(item.salaryDeduct) || 0);
                totalAmount += net;
                if (item.position && item.position.trim() && item.position.trim() !== '无') {
                    staffCount++;
                }
            });
            document.getElementById('headerTotalAmount').textContent = '¥ ' + totalAmount.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            document.getElementById('headerStaffCount').textContent = staffCount;
        }

        async function loadPerformanceData() {
            try {
                var response = await fetch(API_BASE_URL + '/api/performance/list');
                var result = await response.json();
                var data = result.data || result;
                if (Array.isArray(data)) {
                    allData = data;
                } else if (data && data.list) {
                    allData = data.list;
                } else {
                    allData = [];
                }
            } catch (error) {
                console.error('加载绩效数据失败:', error);
                allData = [];
            }

            filteredData = allData.slice();
            currentPage = 1;
            updateHeaderStats();
            renderTable();
        }

        async function confirmLate(employeeId) {
            if (!confirm('确认该员工迟到？将扣款50元。')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/performance/confirm-late`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: employeeId, type: 'late' })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) { loadPerformanceData(); }
            } catch (e) { alert('操作失败'); }
        }

        async function confirmEarly(employeeId) {
            if (!confirm('确认该员工早退？将扣款50元。')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/performance/confirm-early`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: employeeId, type: 'early' })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) { loadPerformanceData(); }
            } catch (e) { alert('操作失败'); }
        }

        async function forgiveLate(employeeId) {
            if (!confirm('确定赦免该员工的迟到记录？扣款将撤销。')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/performance/forgive-late`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: employeeId })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) { loadPerformanceData(); }
            } catch (e) { alert('操作失败'); }
        }

        async function forgiveEarly(employeeId) {
            if (!confirm('确定赦免该员工的早退记录？扣款将撤销。')) return;
            try {
                const res = await fetch(`${API_BASE_URL}/api/performance/forgive-early`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ employeeId: employeeId })
                });
                const data = await res.json();
                alert(data.message);
                if (data.success) { loadPerformanceData(); }
            } catch (e) { alert('操作失败'); }
        }

        document.getElementById('searchInput').addEventListener('input', applyFilter);
        document.addEventListener('DOMContentLoaded', loadPerformanceData);

        document.getElementById('logoBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('logo-menu').classList.toggle('active');
        });
        document.addEventListener('click', function(e) {
            var menu = document.getElementById('logo-menu');
            if (menu.classList.contains('active') && !document.getElementById('logoWrapper').contains(e.target)) {
                menu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
