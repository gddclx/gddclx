    <style>
        body {
            background: linear-gradient(to bottom, #ffffff 0%, #e0f0ff 100%);
            background-attachment: fixed;
        }
        .glass-card {
            background-color: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            border-radius: 24px;
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .glass-card:hover {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 1);
        }
        
        .interactive-element {
            transition: all 300ms cubic-bezier(0.22, 1, 0.36, 1);
        }
        .interactive-element:hover {
            transform: scale(1.05);
        }
        .interactive-element:active {
            transform: scale(0.95);
        }
        #logo-menu {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            margin: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px) scale(0.95);
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            z-index: 50;
        }
        #logo-menu.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0) scale(1);
        }

        #ai-chat-panel {
            width: 360px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #ai-chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        #ai-chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        #ai-chat-messages::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 2px;
        }

        .chat-msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            animation: msgIn 0.3s ease-out;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .chat-msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .chat-msg.assistant {
            align-self: flex-start;
            background: #f1f5f9;
            color: #334155;
            border-bottom-left-radius: 4px;
        }
        .chat-msg.loading {
            align-self: flex-start;
            background: #f1f5f9;
            color: #94a3b8;
            display: flex;
            gap: 4px;
            padding: 14px 18px;
        }
        .chat-msg.loading span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #94a3b8;
            animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .chat-msg.loading span:nth-child(1) { animation-delay: 0s; }
        .chat-msg.loading span:nth-child(2) { animation-delay: 0.2s; }
        .chat-msg.loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>

    <script>
        function goHome(){try{var u=JSON.parse(localStorage.getItem('userInfo'));window.location.href=u&&u.role==='admin'?'首页.html':'员工首页.html';}catch(e){window.location.href='员工首页.html';}}
        var attendanceChart = null;

        function renderChart(dataPoints) {
            if (attendanceChart) {
                attendanceChart.updateSeries([{ name: '考勤波动', data: dataPoints }]);
                return;
            }
            var options = {
                series: [{ name: '考勤波动', data: dataPoints }],
                chart: {
                    type: 'area', height: '100%', width: '100%', sparkline: { enabled: true },
                    animations: { enabled: false }
                },
                stroke: { curve: 'smooth', width: 3, colors: ['#3b82f6'] },
                fill: {
                    type: 'gradient',
                    gradient: { shadeIntensity: 1, opacityFrom: 0.4, opacityTo: 0, stops: [0, 100] }
                },
                colors: ['#3b82f6'],
                tooltip: { fixed: { enabled: false }, x: { show: false }, y: { title: { formatter: function () { return '' } } }, marker: { show: false } }
            };
            attendanceChart = new ApexCharts(document.querySelector("#attendanceChart"), options);
            attendanceChart.render();
        }

        async function loadAttendanceData() {
            try {
                var response = await fetch('http://localhost:8080/api/attendance/today/company');
                var result = await response.json();
                var data = result.data || result;

                var todayRate = data.attendanceRate || data.attendance_rate;
                var yesterdayRate = data.yesterdayRate || data.yesterday_rate;
                var checkedCount = data.checkedCount || data.checked_count;
                var totalCount = data.totalCount || data.total_count;
                var trendData = data.trendData || data.trend_data;

                if (todayRate !== undefined && todayRate !== null) {
                    todayRate = parseFloat(Number(todayRate).toFixed(1));
                    document.getElementById('attendanceRate').textContent = todayRate;
                }

                var container = document.getElementById('rateChangeContainer');
                var icon = document.getElementById('rateChangeIcon');
                var text = document.getElementById('rateChangeText');

                if (yesterdayRate !== undefined && yesterdayRate !== null) {
                    yesterdayRate = parseFloat(yesterdayRate);
                    var change = todayRate - yesterdayRate;
                    var absChange = Math.abs(change);
                    absChange = parseFloat(absChange.toFixed(1));

                    container.style.display = 'inline-flex';

                    if (change > 0) {
                        container.className = 'mt-4 inline-flex items-center gap-2 px-4 py-2 bg-emerald-50 rounded-full border border-emerald-100';
                        icon.className = 'fas fa-arrow-up text-emerald-500 text-sm flex justify-center items-center';
                        text.className = 'text-emerald-600 font-medium text-sm';
                        text.textContent = '较昨日提升 ' + absChange + '%';
                    } else if (change < 0) {
                        container.className = 'mt-4 inline-flex items-center gap-2 px-4 py-2 bg-red-50 rounded-full border border-red-100';
                        icon.className = 'fas fa-arrow-down text-red-500 text-sm flex justify-center items-center';
                        text.className = 'text-red-600 font-medium text-sm';
                        text.textContent = '较昨日下降 ' + absChange + '%';
                    } else {
                        container.className = 'mt-4 inline-flex items-center gap-2 px-4 py-2 bg-slate-50 rounded-full border border-slate-100';
                        icon.className = 'fas fa-minus text-slate-400 text-sm flex justify-center items-center';
                        text.className = 'text-slate-500 font-medium text-sm';
                        text.textContent = '与昨日持平';
                    }
                }

                if (trendData && Array.isArray(trendData) && trendData.length > 0) {
                    renderChart(trendData);
                } else {
                    renderChart([todayRate || 0]);
                }
            } catch (error) {
                console.error('加载考勤数据失败:', error);
                renderChart([0]);
            }
        }

        async function loadPerformanceSummary() {
            try {
                var response = await fetch('http://localhost:8080/api/performance/list');
                var result = await response.json();
                var data = result.data || result;
                var list = Array.isArray(data) ? data : (data && data.list ? data.list : []);

                var totalAmount = 0;
                var staffCount = 0;
                list.forEach(function(item) {
                    totalAmount += parseFloat(item.commissionAmount) || 0;
                    if (item.position && item.position.trim() && item.position.trim() !== '无') {
                        staffCount++;
                    }
                });

                var totalWan = (totalAmount / 10000).toFixed(2);
                document.getElementById('perfTotalAmount').textContent = totalWan;
                document.getElementById('perfStaffCount').textContent = staffCount;
            } catch (error) {
                console.error('加载绩效汇总失败:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadAttendanceData();
            loadPerformanceSummary();
        });

        document.getElementById('logoBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            document.getElementById('logo-menu').classList.toggle('active');
        });

        document.addEventListener('click', function(e) {
            var menu = document.getElementById('logo-menu');
            if (menu.classList.contains('active') && !document.getElementById('logoWrapper').contains(e.target)) {
                menu.classList.remove('active');
            }
        });

        var aiChatSend = document.getElementById('ai-chat-send');
        var aiChatInput = document.getElementById('ai-chat-input');
        var aiChatMessages = document.getElementById('ai-chat-messages');

        function scrollChatToBottom() {
            setTimeout(function() {
                aiChatMessages.scrollTop = aiChatMessages.scrollHeight;
            }, 50);
        }

        function addMessage(text, role) {
            var div = document.createElement('div');
            div.className = 'chat-msg ' + role;
            div.textContent = text;
            aiChatMessages.appendChild(div);
            scrollChatToBottom();
            return div;
        }

        function addLoadingMsg() {
            var div = document.createElement('div');
            div.className = 'chat-msg loading';
            div.id = 'loadingMsg';
            div.innerHTML = '<span></span><span></span><span></span>';
            aiChatMessages.appendChild(div);
            scrollChatToBottom();
        }

        function removeLoadingMsg() {
            var el = document.getElementById('loadingMsg');
            if (el) el.remove();
        }

        var aiChatConversationId = null;

        function getChatUserId() {
            var userInfo = localStorage.getItem('userInfo');
            if (userInfo) {
                try {
                    var parsed = JSON.parse(userInfo);
                    return parsed.employeeId || parsed.id || parsed.userId || 'anonymous';
                } catch (e) {}
            }
            return localStorage.getItem('userId') || 'anonymous';
        }

        async function sendChatMessage() {
            var text = aiChatInput.value.trim();
            if (!text) return;

            aiChatInput.value = '';
            addMessage(text, 'user');
            addLoadingMsg();

            var payload = {
                user: getChatUserId(),
                query: text
            };
            if (aiChatConversationId) {
                payload.conversationId = aiChatConversationId;
            }

            try {
                var response = await fetch('http://localhost:8080/api/coze/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('API error: ' + response.status);

                var rawText = await response.text();

                try {
                    var jsonResult = JSON.parse(rawText);
                    if (jsonResult.code === 200 || jsonResult.success) {
                        var reply = jsonResult.data || jsonResult.message || '收到你的消息了';
                        if (jsonResult.conversationId) aiChatConversationId = jsonResult.conversationId;
                        removeLoadingMsg();
                        addMessage(reply, 'assistant');
                        return;
                    }
                } catch (e) {}

                var events = splitNDJSON(rawText);
                var fullAnswer = '';
                var answerMsgEl = null;

                for (var i = 0; i < events.length; i++) {
                    try {
                        var event = JSON.parse(events[i]);
                        // 流式答案块：content.answer 不为 null
                        if (event.content && event.content.answer != null) {
                            fullAnswer += event.content.answer;
                            updateOrCreateAnswer();
                        }

                        // message_start：取 execute_id 用于后续对话
                        if (event.type === 'message_start' && event.content && event.content.message_start) {
                            var executeId = event.content.message_start.execute_id;
                            if (executeId) aiChatConversationId = executeId;
                        }

                        // message_end：最终答案在 content.message_end.answer 里
                        if (event.type === 'message_end' && event.content && event.content.message_end) {
                            var endAnswer = event.content.message_end.answer;
                            if (endAnswer) {
                                fullAnswer += endAnswer;
                            }
                            updateOrCreateAnswer();
                        }
                    } catch (e) {}
                }

                function updateOrCreateAnswer() {
                    if (!fullAnswer) return;
                    if (answerMsgEl) {
                        answerMsgEl.textContent = fullAnswer;
                    } else {
                        removeLoadingMsg();
                        answerMsgEl = addMessage(fullAnswer, 'assistant');
                    }
                    scrollChatToBottom();
                }

                if (!fullAnswer) {
                    removeLoadingMsg();
                    addMessage('收到回复，但未包含有效内容。', 'assistant');
                }
            } catch (err) {
                removeLoadingMsg();
                addMessage('抱歉，AI 服务暂不可用，请稍后重试。', 'assistant');
            }
        }

        function splitNDJSON(text) {
            var results = [];
            var depth = 0;
            var inString = false;
            var escape = false;
            var start = -1;

            for (var i = 0; i < text.length; i++) {
                var ch = text[i];

                if (escape) { escape = false; continue; }
                if (ch === '\\') { escape = true; continue; }
                if (ch === '"') { inString = !inString; continue; }
                if (inString) continue;

                if (ch === '{') {
                    if (depth === 0) start = i;
                    depth++;
                } else if (ch === '}') {
                    depth--;
                    if (depth === 0 && start >= 0) {
                        results.push(text.substring(start, i + 1));
                        start = -1;
                    }
                }
            }

            return results;
        }

        aiChatSend.addEventListener('click', sendChatMessage);

        aiChatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendChatMessage();
            }
        });
    </script>
