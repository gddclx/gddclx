<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS - 任务</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#4F46E5',secondary:'#10B981','primary-50':'#eff6ff','primary-100':'#dbeafe','primary-500':'#4F46E5','primary-600':'#3730a3','nexus-dark':'#0a1128'},borderRadius:{none:'0px',sm:'2px',DEFAULT:'4px',md:'8px',lg:'12px',xl:'16px','2xl':'20px','3xl':'24px',full:'9999px',button:'8px'},fontFamily:{sans:['Inter','-apple-system','BlinkMacSystemFont',"Segoe UI",'Roboto',"Helvetica Neue",'Arial','sans-serif'],pacifico:['Pacifico','serif']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body{background-color:#f6f9fc;background-image:radial-gradient(at 0% 0%,rgba(79,70,229,0.1) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(16,185,129,0.1) 0px,transparent 50%);background-attachment:fixed;}
        .glass-card{background-color:rgba(255,255,255,0.7);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.4);box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);border-radius:24px;transition:all 300ms cubic-bezier(0.22,1,0.36,1);}
        .glass-card:hover{background-color:rgba(255,255,255,0.9);box-shadow:0 4px 6px -1px rgba(0,0,0,0.1);transform:translateY(-4px);}
        .interactive-element{transition:all 300ms cubic-bezier(0.22,1,0.36,1);}
        .interactive-element:hover{transform:scale(1.05);}
        #logo-menu{position:absolute;top:calc(100% + 8px);left:0;margin:0;opacity:0;pointer-events:none;transform:translateY(-10px) scale(0.95);transition:all 0.3s cubic-bezier(0.22,1,0.36,1);z-index:50;}
        #logo-menu.active{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;border:none;cursor:pointer;}
        .btn-primary:hover{transform:scale(1.02);box-shadow:0 4px 12px rgba(99,102,241,0.4);}
        .badge{display:inline-flex;align-items:center;padding:0.125rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:600;}
        .col-tab{padding:0.375rem 1rem;border-radius:0.5rem;font-size:0.875rem;font-weight:500;cursor:pointer;transition:all 0.2s;border:1px solid #e2e8f0;background:#fff;color:#64748b;}
        .col-tab:hover{background:#f1f5f9;}
        .col-tab.active{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;border-color:transparent;}
        .col-check{display:inline-flex;align-items:center;gap:0.375rem;padding:0.375rem 0.75rem;border-radius:0.5rem;border:1px solid #e2e8f0;cursor:pointer;font-size:0.8rem;transition:all 0.2s;user-select:none;}
        .col-check.selected{background:#eef2ff;border-color:#6366f1;color:#4f46e5;font-weight:600;}
    </style>
</head>
<body class="text-slate-800 font-sans p-4 md:p-8 flex flex-col gap-8">
    <header class="flex justify-between items-center w-full max-w-5xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="relative" id="logoWrapper">
                <button id="logoBtn" class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-md flex items-center justify-center interactive-element cursor-pointer">
                    <i class="fas fa-layer-group text-white text-lg flex justify-center items-center"></i>
                </button>
                <div id="logo-menu" class="glass-card w-48 p-2 bg-white/95 border-slate-200 m-0 shadow-xl rounded-xl">
                    <div class="py-2 flex flex-col gap-1">
                        <a href="javascript:history.back()" class="px-4 py-2 text-sm text-slate-700 hover:bg-primary-50 hover:text-primary-600 rounded-lg transition-colors flex items-center gap-2"><i class="fas fa-arrow-left w-4"></i> 回到上一页</a>
                        <a href="消息.html" class="px-4 py-2 text-sm text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors flex items-center gap-2"><i class="fas fa-envelope w-4"></i> 消息中心</a>
                        <a href="登录.html" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2"><i class="fas fa-sign-out-alt w-4"></i> 退出登录</a>
                    </div>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter text-nexus-dark font-pacifico cursor-pointer" onclick="goHome()">logo</h1>
        </div>
        <a href="消息.html" class="relative text-slate-500 hover:text-indigo-500 transition-colors" id="msgBell">
            <i class="fas fa-envelope text-xl"></i>
            <span id="msgBadge" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold" style="display:none">0</span>
        </a>
    </header>

    <main class="w-full max-w-5xl mx-auto flex-1 flex flex-col gap-6">
        <div id="adminView" style="display:none">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold text-slate-800"><i class="fas fa-clipboard-list text-indigo-500 mr-2"></i>任务管理（管理员）</h1>
                <div class="flex gap-3">
                    <button onclick="showCreateForm()" class="btn-primary"><i class="fas fa-plus mr-1"></i>发布任务</button>
                    <button onclick="refresh()" class="px-4 py-2 bg-white rounded-lg shadow text-slate-600 hover:bg-slate-50"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
            <div class="flex gap-2 mb-4 flex-wrap" id="adminTabs">
                <button onclick="switchTab('active')" id="tab-active" class="col-tab active">进行中</button>
                <button onclick="switchTab('all')" id="tab-all" class="col-tab">全部</button>
                <span class="text-slate-300 mx-2 self-center">|</span>
                <button onclick="switchCol(0)" id="col-0" class="col-tab active">全部栏位</button>
                <button onclick="switchCol(1)" id="col-1" class="col-tab">🔴 1号栏</button>
                <button onclick="switchCol(2)" id="col-2" class="col-tab">🟢 2号栏</button>
                <button onclick="switchCol(3)" id="col-3" class="col-tab">🔵 3号栏</button>
                <button onclick="switchCol(-1)" id="col--1" class="col-tab">未分类</button>
            </div>
        </div>

        <div id="employeeView" style="display:none">
            <div class="flex justify-between items-center mb-2">
                <h1 class="text-2xl font-bold text-slate-800"><i class="fas fa-clipboard-check text-indigo-500 mr-2"></i>任务中心</h1>
                <div class="flex gap-3">
                    <a href="消息.html" class="relative text-slate-500 hover:text-indigo-500 transition-colors self-center">
                        <i class="fas fa-envelope text-xl"></i>
                        <span id="msgBadge2" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center font-bold" style="display:none">0</span>
                    </a>
                    <button onclick="refresh()" class="px-4 py-2 bg-white rounded-lg shadow text-slate-600 hover:bg-slate-50"><i class="fas fa-sync-alt"></i></button>
                </div>
            </div>
            <div class="flex gap-2 mb-4 flex-wrap" id="empTabs">
                <button onclick="switchTab('active')" id="tab-active" class="col-tab active">可用任务</button>
                <button onclick="switchTab('my')" id="tab-my" class="col-tab">我的提交</button>
                <span class="text-slate-300 mx-2 self-center">|</span>
                <button onclick="switchCol(0)" id="col-0" class="col-tab active">全部栏位</button>
                <button onclick="switchCol(1)" id="col-1" class="col-tab">🔴 1号栏</button>
                <button onclick="switchCol(2)" id="col-2" class="col-tab">🟢 2号栏</button>
                <button onclick="switchCol(3)" id="col-3" class="col-tab">🔵 3号栏</button>
            </div>
        </div>

        <div id="toast" class="fixed top-4 right-4 z-[100] px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300 pointer-events-none opacity-0" style="transform:translateY(-20px)"></div>
        <div id="taskList" class="space-y-3"></div>

        <!-- Create Task Modal (admin only) -->
        <div id="createModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display:none">
            <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto" style="animation:fadeIn 0.2s ease-out">
                <h2 class="text-lg font-bold mb-4">📋 发布新任务</h2>
                <div class="space-y-3">
                    <input id="newTitle" placeholder="任务标题" class="w-full px-3 py-2 border rounded-lg">
                    <textarea id="newContent" rows="4" placeholder="任务描述（要求、标准等）" class="w-full px-3 py-2 border rounded-lg"></textarea>
                    <input id="newDeadline" type="date" class="w-full px-3 py-2 border rounded-lg">
                    <div>
                        <p class="text-xs text-slate-500 mb-2">📌 发布到栏位（可多选）</p>
                        <div class="flex gap-2 flex-wrap" id="columnCheckboxes">
                            <label class="col-check" data-col="1" onclick="toggleColCheck(this)"><i class="fas fa-circle text-red-400 text-xs"></i> 1号栏</label>
                            <label class="col-check" data-col="2" onclick="toggleColCheck(this)"><i class="fas fa-circle text-green-400 text-xs"></i> 2号栏</label>
                            <label class="col-check" data-col="3" onclick="toggleColCheck(this)"><i class="fas fa-circle text-blue-400 text-xs"></i> 3号栏</label>
                        </div>
                    </div>
                    <div><p class="text-xs text-slate-500 mb-1">附件（可选）</p><input id="newFiles" type="file" multiple class="w-full px-3 py-2 border rounded-lg"></div>
                </div>
                <div class="flex gap-3 mt-4 justify-end">
                    <button onclick="document.getElementById('createModal').style.display='none'" class="px-4 py-2 bg-slate-100 rounded-lg">取消</button>
                    <button onclick="doCreate()" class="btn-primary">发布任务</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API=getApiBase();
        let currentTab='active',currentCol=0,currentUser=null,isAdmin=false;

        function toast(msg,color){
            const el=document.getElementById('toast');
            el.textContent=msg;el.className='fixed top-4 right-4 z-[100] px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300';
            el.classList.add(color==='green'?'bg-emerald-500':color==='red'?'bg-red-500':'bg-slate-700');
            el.style.opacity='1';el.style.transform='translateY(0)';el.style.pointerEvents='auto';
            clearTimeout(el._tid);el._tid=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(-20px)';},2000);
        }

        function goHome(){
            try{var u=JSON.parse(localStorage.getItem('userInfo'));window.location.href=u&&u.role==='admin'?'首页.html':'员工首页.html';}catch(e){window.location.href='员工首页.html';}
        }
        function getUser(){
            if(currentUser)return currentUser;
            try{currentUser=JSON.parse(localStorage.getItem('userInfo'));}catch(e){}
            if(!currentUser)currentUser={employeeId:localStorage.getItem('userId')||'1',role:'user'};
            isAdmin=currentUser.role==='admin';
            return currentUser;
        }

        function initView(){
            getUser();
            document.getElementById('adminView').style.display=isAdmin?'':'none';
            document.getElementById('employeeView').style.display=isAdmin?'none':'';
            currentTab='active';currentCol=0;
            updateTabStyles('tab-active');
            updateColStyles(0);
            refresh();
            if(!isAdmin) loadUnreadCount();
        }

        function updateTabStyles(activeId){
            document.querySelectorAll('[id^="tab-"]').forEach(b=>b.className='col-tab');
            const el=document.getElementById(activeId);
            if(el)el.className='col-tab active';
        }

        function updateColStyles(col){
            document.querySelectorAll('[id^="col-"]').forEach(b=>b.className='col-tab');
            const el=document.getElementById('col-'+col);
            if(el)el.className='col-tab active';
        }

        async function loadUnreadCount(){
            const u=getUser();
            try{
                const r=await fetch(`${API}/api/message/unread-count?employeeId=${u.employeeId||u.employee_id}`);
                const d=await r.json();
                if(d.success&&d.data.count>0){
                    ['msgBadge','msgBadge2'].forEach(id=>{
                        const el=document.getElementById(id);
                        if(el){el.style.display='flex';el.textContent=d.data.count;}
                    });
                }
            }catch(e){}
        }

        async function refresh(){
            const u=getUser();
            try{
                if(!isAdmin&&currentTab==='my'){
                    const r=await fetch(`${API}/api/task/my-submissions?employeeId=${u.employeeId||u.employee_id}`);
                    const d=await r.json();renderMySubmissions(d.data||[]);
                }else{
                    let url=`${API}/api/task/list?filter=${currentTab}`;
                    if(currentCol>0) url+=`&column=${currentCol}`;
                    else if(currentCol===-1) url+=`&column=0`;
                    const r=await fetch(url);
                    const d=await r.json();renderTaskList(d.data||[]);
                }
            }catch(e){document.getElementById('taskList').innerHTML='<p class="text-slate-400 text-center py-8">加载失败</p>';}
        }

        function switchTab(tab){
            currentTab=tab;
            updateTabStyles('tab-'+tab);
            refresh();
        }

        function switchCol(col){
            currentCol=col;
            updateColStyles(col);
            if(currentTab==='my'){currentTab='active';updateTabStyles('tab-active');}
            refresh();
        }

        const COL_LABELS={1:'🔴 1号栏',2:'🟢 2号栏',3:'🔵 3号栏'};
        const COL_COLORS={1:'bg-red-100 text-red-700',2:'bg-green-100 text-green-700',3:'bg-blue-100 text-blue-700'};

        function renderTaskList(tasks){
            const el=document.getElementById('taskList');
            if(!tasks.length){el.innerHTML='<p class="text-slate-400 text-center py-8">暂无任务</p>';return;}
            el.innerHTML=tasks.map(t=>{
                const linkHref=isAdmin?`任务审核.html?taskId=${t.id}`:`任务提交.html?taskId=${t.id}`;
                const linkLabel=isAdmin?'审核':'提交';
                const colTag=t.columnNo&&COL_LABELS[t.columnNo]?`<span class="badge ${COL_COLORS[t.columnNo]||'bg-slate-100 text-slate-500'}">${COL_LABELS[t.columnNo]}</span>`:'';
                return`
                <div class="glass-card p-5 hover:shadow-md transition-shadow">
                    <div class="flex justify-between items-start">
                        <div class="flex-1 cursor-pointer" onclick="openTask(${t.id})">
                            <div class="flex items-center gap-2 mb-1">${colTag}<h3 class="font-bold text-slate-800 text-lg">${esc(t.title)}</h3></div>
                            <p class="text-sm text-slate-500 mt-1">${esc(t.content||'').substring(0,100)}</p>
                            ${t.files&&t.files.length?`<p class="text-xs text-indigo-500 mt-1"><i class="fas fa-paperclip"></i> ${t.files.length} 个附件</p>`:''}
                        </div>
                        <div class="text-right shrink-0 ml-4">
                            <span class="badge ${t.status==='active'?'bg-green-100 text-green-700':'bg-slate-100 text-slate-500'}">${t.status==='active'?'进行中':'已关闭'}</span>
                            <p class="text-xs text-slate-400 mt-1">${t.submissionCount||0} 人提交</p>
                            ${t.deadline?`<p class="text-xs text-orange-500 mt-1">⏰ ${t.deadline}</p>`:''}
                            <a href="${linkHref}" class="inline-block mt-2 text-xs px-4 py-1.5 bg-indigo-500 text-white rounded-lg font-medium hover:bg-indigo-600 transition-colors">
                                <i class="fas ${isAdmin?'fa-gavel':'fa-paper-plane'} mr-1"></i>${linkLabel}
                            </a>
                            ${isAdmin?`<button onclick="event.stopPropagation();doDelete(${t.id},'${esc(t.title).replace(/'/g,"\\'")}')" class="inline-block mt-2 ml-1 text-xs px-3 py-1.5 bg-red-500 text-white rounded-lg font-medium hover:bg-red-600 transition-colors"><i class="fas fa-trash mr-1"></i>删除</button>`:''}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderMySubmissions(subs){
            const el=document.getElementById('taskList');
            if(!subs.length){el.innerHTML='<p class="text-slate-400 text-center py-8">暂无提交</p>';return;}
            el.innerHTML=subs.map(s=>{
                const cls=s.status==='approved'?'bg-green-100 text-green-700':s.status==='rejected'?'bg-red-100 text-red-700':'bg-yellow-100 text-yellow-700';
                const txt=s.status==='approved'?'✅ 已验收':s.status==='rejected'?'❌ 已打回':'⏳ 待审核';
                return`
                <div class="glass-card p-5 cursor-pointer hover:shadow-md transition-shadow" onclick="window.location.href='任务提交.html?taskId=${s.taskId}'">
                    <div class="flex justify-between items-start"><div class="flex-1"><h3 class="font-bold text-slate-800">任务 #${s.taskId}</h3><p class="text-sm text-slate-500 mt-1 whitespace-pre-wrap">${esc(s.content||'（无文字描述）')}</p></div><span class="badge ${cls} shrink-0 ml-4">${txt}</span></div>
                    ${s.reviewComment?`<div class="mt-3 bg-slate-50 rounded-lg p-3 border"><p class="text-xs text-slate-500 mb-1">管理员评语：</p><p class="text-sm text-slate-700">${esc(s.reviewComment)}</p></div>`:''}
                    ${s.files&&s.files.length?'<div class="mt-2">'+s.files.map(f=>`<span class="text-indigo-500 text-sm mr-3"><i class="fas fa-paperclip"></i> ${esc(f.fileName)}</span>`).join('')+'</div>':''}
                </div>
            `}).join('');
        }

        function openTask(taskId){
            getUser();
            window.location.href=(isAdmin?'任务审核.html':'任务提交.html')+'?taskId='+taskId;
        }

        async function doDelete(id,title){
            if(!confirm('确定要删除任务"' + title + '"吗？\n\n此操作将同时删除所有提交记录和附件，不可恢复！'))return;
            try{
                const r=await fetch(`${API}/api/task/${id}`,{method:'DELETE'});
                const d=await r.json();
                if(d.success){toast('任务已删除','green');refresh();}
                else toast(d.message,'red');
            }catch(e){toast('删除失败','red');}
        }

        function showCreateForm(){
            ['newTitle','newContent','newDeadline'].forEach(id=>document.getElementById(id).value='');
            document.getElementById('newFiles').value='';
            document.querySelectorAll('#columnCheckboxes .col-check').forEach(c=>c.classList.remove('selected'));
            document.getElementById('createModal').style.display='flex';
        }

        function toggleColCheck(el){
            document.querySelectorAll('#columnCheckboxes .col-check').forEach(c=>c.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function doCreate(){
            const u=getUser();const fd=new FormData();
            fd.append('publisherId',u.employeeId||u.employee_id);
            fd.append('title',document.getElementById('newTitle').value);
            fd.append('content',document.getElementById('newContent').value);
            fd.append('deadline',document.getElementById('newDeadline').value);
            const cols=document.querySelectorAll('#columnCheckboxes .col-check.selected');
            cols.forEach(c=>fd.append('columnNo',c.dataset.col));
            for(let f of document.getElementById('newFiles').files)fd.append('files',f);
            if(cols.length===0){toast('请选择至少一个栏位','red');return;}
            try{
                const r=await fetch(`${API}/api/task/create`,{method:'POST',body:fd});const d=await r.json();
                if(d.success){document.getElementById('createModal').style.display='none';refresh();toast('任务发布成功','green');}
                else toast(d.message,'red');
            }catch(e){toast('创建失败','red');}
        }

        function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

        document.addEventListener('DOMContentLoaded',()=>{
            initView();
            document.getElementById('logoBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('logo-menu').classList.toggle('active');});
            document.addEventListener('click',function(e){const m=document.getElementById('logo-menu');if(m.classList.contains('active')&&!document.getElementById('logoWrapper').contains(e.target))m.classList.remove('active');});
        });
    </script>
</body>
</html>
