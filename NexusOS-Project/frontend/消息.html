<!DOCTYPE html>
<html lang="zh-CN" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS - 消息</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{primary:'#4F46E5',secondary:'#10B981','primary-50':'#eff6ff','primary-100':'#dbeafe','primary-500':'#4F46E5','primary-600':'#3730a3','nexus-dark':'#0a1128'},borderRadius:{none:'0px',sm:'2px',DEFAULT:'4px',md:'8px',lg:'12px',xl:'16px','2xl':'20px','3xl':'24px',full:'9999px',button:'8px'},fontFamily:{sans:['Inter','-apple-system','BlinkMacSystemFont',"Segoe UI",'Roboto',"Helvetica Neue",'Arial','sans-serif'],pacifico:['Pacifico','serif']}}}}</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <style>
        body{background-color:#f6f9fc;background-image:radial-gradient(at 0% 0%,rgba(79,70,229,0.1) 0px,transparent 50%),radial-gradient(at 100% 100%,rgba(16,185,129,0.1) 0px,transparent 50%);background-attachment:fixed;}
        .glass-card{background-color:rgba(255,255,255,0.7);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.4);box-shadow:0 1px 2px 0 rgba(0,0,0,0.05);border-radius:24px;transition:all 300ms cubic-bezier(0.22,1,0.36,1);}
        .interactive-element{transition:all 300ms cubic-bezier(0.22,1,0.36,1);}
        .interactive-element:hover{transform:scale(1.05);}
        #logo-menu{position:absolute;top:calc(100% + 8px);left:0;margin:0;opacity:0;pointer-events:none;transform:translateY(-10px) scale(0.95);transition:all 0.3s cubic-bezier(0.22,1,0.36,1);z-index:50;}
        #logo-menu.active{opacity:1;pointer-events:auto;transform:translateY(0) scale(1);}
        .btn-primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;}
        .btn-primary:hover{transform:scale(1.02);box-shadow:0 4px 12px rgba(99,102,241,0.4);}
        .msg-item{cursor:pointer;transition:all 0.2s;border-left:3px solid transparent;}
        .msg-item:hover{border-left-color:#6366f1;background:#f8fafc;}
        .msg-item.unread{border-left-color:#6366f1;background:#eef2ff;}
        .tab-btn{padding:0.5rem 1.25rem;border-radius:0.5rem;font-weight:600;font-size:0.875rem;cursor:pointer;transition:all 0.2s;border:none;}
    </style>
</head>
<body class="text-slate-800 font-sans p-4 md:p-8 flex flex-col gap-8">
    <header class="flex justify-between items-center w-full max-w-4xl mx-auto">
        <div class="flex items-center gap-3">
            <div class="relative" id="logoWrapper">
                <button id="logoBtn" class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-md flex items-center justify-center interactive-element cursor-pointer">
                    <i class="fas fa-layer-group text-white text-lg flex justify-center items-center"></i>
                </button>
                <div id="logo-menu" class="glass-card w-48 p-2 bg-white/95 border-slate-200 m-0 shadow-xl rounded-xl">
                    <div class="py-2 flex flex-col gap-1">
                        <a href="javascript:history.back()" class="px-4 py-2 text-sm text-slate-700 hover:bg-primary-50 hover:text-primary-600 rounded-lg transition-colors flex items-center gap-2"><i class="fas fa-arrow-left w-4"></i> 回到上一页</a>
                        <a href="登录.html" class="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center gap-2"><i class="fas fa-sign-out-alt w-4"></i> 退出登录</a>
                    </div>
                </div>
            </div>
            <h1 class="text-2xl font-bold tracking-tighter text-nexus-dark font-pacifico cursor-pointer" onclick="goHome()">logo</h1>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto flex flex-col gap-6">
        <a href="javascript:history.back()" class="text-indigo-500 text-sm hover:underline"><i class="fas fa-arrow-left mr-1"></i>返回</a>

        <!-- Tab Switch -->
        <div class="flex gap-2">
            <button onclick="switchMsgTab('inbox')" id="tab-inbox" class="tab-btn bg-indigo-500 text-white"><i class="fas fa-inbox mr-1"></i>收件箱</button>
            <button onclick="switchMsgTab('sent')" id="tab-sent" class="tab-btn bg-white text-slate-600"><i class="fas fa-paper-plane mr-1"></i>已发送</button>
            <button onclick="switchMsgTab('send')" id="tab-send" class="tab-btn bg-white text-slate-600"><i class="fas fa-pen mr-1"></i>发消息</button>
        </div>

        <!-- Toolbar -->
        <div id="msgToolbar" class="flex justify-end" style="display:none">
            <button onclick="deleteAllRead()" class="text-xs px-3 py-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 transition-colors"><i class="fas fa-trash-alt mr-1"></i>清除所有已读</button>
        </div>

        <!-- Message List -->
        <div id="msgList" class="space-y-2"></div>

        <!-- Message Detail Modal -->
        <div id="detailModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50" style="display:none">
            <div class="bg-white rounded-2xl p-6 w-full max-w-lg mx-4 max-h-[80vh] overflow-y-auto" style="animation:fadeIn 0.2s ease-out">
                <h2 class="text-lg font-bold mb-2" id="detailTitle"></h2>
                <div class="flex gap-4 text-xs text-slate-500 mb-4">
                    <span>发件人：<b id="detailFrom"></b></span>
                    <span>收件人：<b id="detailTo"></b></span>
                    <span id="detailTime"></span>
                </div>
                <div class="bg-slate-50 rounded-lg p-4 text-sm whitespace-pre-wrap" id="detailContent"></div>
                <div class="flex justify-end mt-4 gap-2">
                    <button onclick="replyMsg()" class="btn-primary"><i class="fas fa-reply mr-1"></i>回复</button>
                    <button onclick="document.getElementById('detailModal').style.display='none'" class="px-4 py-2 bg-slate-100 rounded-lg">关闭</button>
                </div>
            </div>
        </div>

        <!-- Send Message Form -->
        <div id="sendForm" class="glass-card p-6" style="display:none">
            <h2 class="text-lg font-bold mb-4"><i class="fas fa-pen mr-2"></i>发送消息</h2>
            <div class="space-y-3">
                <div>
                    <p class="text-xs text-slate-500 mb-1">收件人工号</p>
                    <input id="sendTo" placeholder="输入员工工号" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <p class="text-xs text-slate-500 mb-1">标题</p>
                    <input id="sendTitle" placeholder="消息标题" class="w-full px-3 py-2 border rounded-lg">
                </div>
                <div>
                    <p class="text-xs text-slate-500 mb-1">内容</p>
                    <textarea id="sendContent" rows="5" placeholder="输入消息内容..." class="w-full px-3 py-2 border rounded-lg"></textarea>
                </div>
            </div>
            <div class="flex gap-3 mt-4 justify-end">
                <button onclick="switchMsgTab('inbox')" class="px-4 py-2 bg-slate-100 rounded-lg">取消</button>
                <button onclick="doSend()" class="btn-primary"><i class="fas fa-paper-plane mr-1"></i>发送</button>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed top-4 right-4 z-[100] px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300 pointer-events-none opacity-0" style="transform:translateY(-20px)"></div>

    <script>
        const API=getApiBase();
        let msgTab='inbox';
        let allMessages=[];
        let currentMsg=null;

        function goHome(){
            try{var u=JSON.parse(localStorage.getItem('userInfo'));window.location.href=u&&u.role==='admin'?'首页.html':'员工首页.html';}catch(e){window.location.href='员工首页.html';}
        }
        function getUser(){
            try{return JSON.parse(localStorage.getItem('userInfo'));}catch(e){}
            return {employeeId:localStorage.getItem('userId')||'1',role:'user'};
        }

        function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

        function toast(msg,color){
            const el=document.getElementById('toast');
            el.textContent=msg;el.className='fixed top-4 right-4 z-[100] px-4 py-3 rounded-lg text-white text-sm font-medium shadow-lg transition-all duration-300';
            el.classList.add(color==='green'?'bg-emerald-500':color==='red'?'bg-red-500':'bg-slate-700');
            el.style.opacity='1';el.style.transform='translateY(0)';el.style.pointerEvents='auto';
            clearTimeout(el._tid);el._tid=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(-20px)';},2000);
        }

        function switchMsgTab(tab){
            msgTab=tab;
            document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn bg-white text-slate-600');
            document.getElementById('tab-'+tab).className='tab-btn bg-indigo-500 text-white';
            document.getElementById('sendForm').style.display=tab==='send'?'':'none';
            document.getElementById('msgList').style.display=tab==='send'?'none':'';
            if(tab==='inbox') loadInbox();
            else if(tab==='sent') loadSent();
        }

        async function loadInbox(){
            const u=getUser();
            try{
                const r=await fetch(`${API}/api/message/received?employeeId=${u.employeeId||u.employee_id}`);
                const d=await r.json();
                allMessages=d.data||[];
                renderList(allMessages,'inbox');
            }catch(e){document.getElementById('msgList').innerHTML='<p class="text-slate-400 text-center py-8">加载失败</p>';}
        }

        async function loadSent(){
            const u=getUser();
            try{
                const r=await fetch(`${API}/api/message/sent?employeeId=${u.employeeId||u.employee_id}`);
                const d=await r.json();
                allMessages=d.data||[];
                renderList(allMessages,'sent');
            }catch(e){document.getElementById('msgList').innerHTML='<p class="text-slate-400 text-center py-8">加载失败</p>';}
        }

        function renderList(msgs,type){
            const el=document.getElementById('msgList');
            const tb=document.getElementById('msgToolbar');
            if(!msgs.length){
                el.innerHTML='<div class="glass-card p-12 text-center text-slate-400"><i class="fas fa-inbox text-4xl mb-4 block"></i>暂无消息</div>';
                tb.style.display='none';
                return;
            }
            const hasRead=msgs.some(m=>m.isRead===1||m.isRead===0);
            tb.style.display=type==='inbox'?'':'none';
            el.innerHTML=msgs.map(m=>{
                const isUnread=type==='inbox'&&m.isRead===0;
                const displayName=type==='inbox'?m.senderId:m.receiverId;
                const icon=type==='inbox'?'<i class="fas fa-envelope text-indigo-400"></i>':'<i class="fas fa-paper-plane text-slate-400"></i>';
                return`
                <div class="glass-card p-4 msg-item ${isUnread?'unread':''}">
                    <div class="flex justify-between items-start" onclick="openDetail(${m.id})">
                        <div class="flex items-center gap-3 flex-1 cursor-pointer">
                            <div class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center">${icon}</div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <h3 class="font-bold text-slate-800">${esc(m.title)}</h3>
                                    ${isUnread?'<span class="w-2 h-2 rounded-full bg-indigo-500"></span>':''}
                                </div>
                                <p class="text-xs text-slate-500">${type==='inbox'?'来自':'发给'}：${esc(displayName)} · ${m.createdAt?m.createdAt.substring(0,16):''}</p>
                            </div>
                        </div>
                        <button class="text-slate-300 hover:text-red-500 transition-colors p-1 shrink-0" onclick="event.stopPropagation();deleteMsg(${m.id})" title="删除"><i class="fas fa-times-circle text-lg"></i></button>
                    </div>
                </div>
            `}).join('');
        }

        async function openDetail(id){
            try{
                const r=await fetch(`${API}/api/message/${id}`);
                const d=await r.json();
                if(d.success){
                    currentMsg=d.data;
                    document.getElementById('detailTitle').textContent=currentMsg.title;
                    document.getElementById('detailFrom').textContent=currentMsg.senderId;
                    document.getElementById('detailTo').textContent=currentMsg.receiverId;
                    document.getElementById('detailTime').textContent=currentMsg.createdAt?currentMsg.createdAt.substring(0,16):'';
                    document.getElementById('detailContent').textContent=currentMsg.content||'（无内容）';
                    document.getElementById('detailModal').style.display='flex';
                    if(msgTab==='inbox') loadInbox();
                }
            }catch(e){toast('加载失败','red');}
        }

        function replyMsg(){
            document.getElementById('detailModal').style.display='none';
            msgTab='send';
            document.querySelectorAll('.tab-btn').forEach(b=>b.className='tab-btn bg-white text-slate-600');
            document.getElementById('tab-send').className='tab-btn bg-indigo-500 text-white';
            document.getElementById('sendForm').style.display='';
            document.getElementById('msgList').style.display='none';
            if(currentMsg){
                document.getElementById('sendTo').value=currentMsg.senderId;
                document.getElementById('sendTitle').value='Re: '+currentMsg.title;
                document.getElementById('sendContent').value='';
            }
        }

        async function deleteMsg(id){
            if(!confirm('确定要删除这条消息吗？'))return;
            try{
                const r=await fetch(`${API}/api/message/${id}`,{method:'DELETE'});
                const d=await r.json();
                if(d.success){
                    toast('已删除','green');
                    if(msgTab==='inbox') loadInbox();
                    else loadSent();
                }else toast(d.message,'red');
            }catch(e){toast('删除失败','red');}
        }

        async function deleteAllRead(){
            const u=getUser();
            if(!confirm('确定要清除所有已读消息吗？此操作不可恢复！'))return;
            try{
                const r=await fetch(`${API}/api/message/read-all?employeeId=${u.employeeId||u.employee_id}`,{method:'DELETE'});
                const d=await r.json();
                if(d.success){toast('已清除所有已读消息','green');loadInbox();}
                else toast(d.message,'red');
            }catch(e){toast('操作失败','red');}
        }

        async function doSend(){
            const u=getUser();
            const to=document.getElementById('sendTo').value.trim();
            const title=document.getElementById('sendTitle').value.trim();
            const content=document.getElementById('sendContent').value.trim();
            if(!to||!title){toast('请填写收件人和标题','red');return;}
            try{
                const params=new URLSearchParams();
                params.append('senderId',u.employeeId||u.employee_id);
                params.append('receiverId',to);
                params.append('title',title);
                params.append('content',content);
                const r=await fetch(`${API}/api/message/send`,{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:params});
                const d=await r.json();
                if(d.success){
                    toast('发送成功！','green');
                    document.getElementById('sendTo').value='';
                    document.getElementById('sendTitle').value='';
                    document.getElementById('sendContent').value='';
                    switchMsgTab('sent');
                }else toast(d.message,'red');
            }catch(e){toast('发送失败','red');}
        }

        document.addEventListener('DOMContentLoaded',()=>{
            switchMsgTab('inbox');
            document.getElementById('logoBtn').addEventListener('click',function(e){e.stopPropagation();document.getElementById('logo-menu').classList.toggle('active');});
            document.addEventListener('click',function(e){const m=document.getElementById('logo-menu');if(m.classList.contains('active')&&!document.getElementById('logoWrapper').contains(e.target))m.classList.remove('active');});
        });
    </script>
</body>
</html>
